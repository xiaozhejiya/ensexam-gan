# ── 模型结构 ──────────────────────────────────────────────────────────────────
model:
  coarse_in_channels: 3       # CoarseNet 输入通道数，RGB 图像固定为 3
  refine_in_channels: 7       # RefineNet 输入 = Iin(3) + Ms(1) + Ic1(3)，固定为 7
  cbam_reduction: 16          # CBAM 通道注意力压缩比，越大参数越少但表达力越弱

# ── 损失函数权重 ───────────────────────────────────────────────────────────────
loss:
  # LR Loss 多尺度文本区域权重：对应 [Ic4(1/4), Ic2(1/2), Ic1(1/1), Ire] 四个输出
  # 越靠近原分辨率权重越大，强迫网络在全尺度上精细还原
  lambda_n: [5, 6, 8, 10]

  # LR Loss 多尺度非文本区域权重：背景区域也需要保留，防止过度修改
  beta_n: [0.8, 0.8, 0.8, 2.0]

  lambda_lr: 1.0              # LR Loss 总缩放系数
  lambda_p: 0.05              # 感知损失（VGG 特征 L1）权重，太大会模糊
  lambda_style: 120           # 风格损失（Gram 矩阵）权重，控制纹理一致性
  lambda_sn: 1.0              # SN Loss 权重，监督软笔画掩码 Ms 的精度
  lambda_b: 0.4               # Block Loss 权重，监督文本块掩码 Mb（Dice Loss）

# ── 训练超参数 ─────────────────────────────────────────────────────────────────
train:
  epochs: 100
  batch_size: 8
  lr: 0.0001                  # Adam 初始学习率
  adam_betas: [0.5, 0.9]      # Adam 动量参数，GAN 训练通常用 (0.5, 0.9) 而非默认 (0.9, 0.999)
  device: auto                # "auto" 自动选择 cuda/cpu，也可手动指定 "cuda:0"
  num_workers: 0              # DataLoader 子进程数，Windows 下必须为 0
  save_every_n_epochs: 5      # 每隔多少 epoch 保存一次 checkpoint
  save_dir: ./ensexam_checkpoints
  resume: false               # 是否从 resume_path 断点续训
  resume_path: ./ensexam_checkpoints/latest.pth

# ── 数据集与预处理 ─────────────────────────────────────────────────────────────
data:
  data_root: E:/dataset/SCUT-EnsExam   # 数据集根目录，需含 train/test 子目录
  img_size: 512               # 裁剪块大小，模型固定输入尺寸
  overlap: 0                  # 滑动裁剪重叠像素，设为 128 可增加训练样本量
  mask_threshold: 20          # 生成掩码时判断像素差异的阈值（0~255），越小掩码越密

  # 数据增强（albumentations）；注释掉整个 augmentation 节可完全关闭增强
  augmentation:
    horizontal_flip_p: 0.5          # 水平翻转概率
    vertical_flip_p: 0.3            # 垂直翻转概率
    rotate90_p: 0.3                 # 随机旋转 90/180/270° 概率（仅适用于正方形 patch）
    brightness_limit: 0.2           # 亮度扰动幅度，实际范围 [-0.2, 0.2]
    contrast_limit: 0.2             # 对比度扰动幅度，实际范围 [-0.2, 0.2]
    brightness_contrast_p: 0.5      # 亮度/对比度增强整体概率
    gauss_noise_var_limit: [10, 50] # 高斯噪声方差范围（像素强度²），模拟扫描噪点
    gauss_noise_p: 0.2              # 高斯噪声概率

# ── 早停 ───────────────────────────────────────────────────────────────────────
early_stopping:
  enabled: true
  patience: 10                # 连续多少 epoch 无改善后停止
  min_delta: 0.001            # 认定为"有改善"的最小变化量（绝对值）
  mode: min                   # "min"（监控 loss）或 "max"（监控 PSNR 等）

# ── 日志 ───────────────────────────────────────────────────────────────────────
logging:
  log_dir: ./logs             # 日志目录：train.log（文本）+ loss_history.csv（曲线数据）

# ── Reptile 元训练 ─────────────────────────────────────────────────────────────
# 运行 meta_train.py 使用；train.py 二次训练时忽略此节
# 数据集统计（tools/analyze_dataset.py）：430 张图，每图约 15~20 patches，
# batch_size=8 下每个 task 仅有 ~2 个 batch，因此 inner_steps 不宜超过 2
reptile:
  meta_epochs: 500            # 500 episode，每张图平均被元训练 ~4.7 次
  inner_lr: 0.0001            # 与 train.lr 保持一致
  inner_steps: 1              # 每 task 仅 ~2 batch，1 步看一半数据即可，防止过拟合
  meta_lr: 0.1                # ε，Reptile 标准值
  n_tasks_per_episode: 4      # 每 episode 采样 4 张图（共 430 张，足够随机）
  save_every_n_epochs: 50     # 每 50 episode 保存一次中间 checkpoint
  save_dir: ./reptile_checkpoints

# ── 超参数调优（Optuna） ────────────────────────────────────────────────────────
tuning:
  n_trials: 50                          # 总共跑多少个 trial
  tune_epochs: 5                        # 每个 trial 跑几个 epoch
  init_weights: ./reptile_checkpoints/reptile_meta_init.pth  # 每个 trial 的起点权重
  storage: sqlite:///tuning.db          # SQLite 持久化，支持断点续调
  study_name: ensexam_finetune

  # 搜索空间：[min, max]，log: true 的参数建议跨越多个数量级
  search_space:
    lr: [1.0e-5, 1.0e-3]      # log scale，最影响收敛速度
    beta1: [0.3, 0.7]          # Adam β₁，GAN 训练对此敏感
    lambda_p: [0.01, 0.2]      # log scale，感知损失权重
    lambda_style: [50, 300]    # log scale，风格损失权重
    lambda_b: [0.1, 1.0]       # Block Loss（Dice）权重

# ── W&B ────────────────────────────────────────────────────────────────────────
wandb:
  enabled: true
  project: ensexam             # W&B 项目名，同名实验会归到同一个项目下
  run_name: null               # null = W&B 自动生成随机名称（如 "golden-dawn-42"）
  log_image_every_n_epochs: 5  # 每隔多少 epoch 上传一批擦除对比图
