# ── 模型结构 ──────────────────────────────────────────────────────────────────
model:
  coarse_in_channels: 3       # CoarseNet 输入通道数，RGB 图像固定为 3
  refine_in_channels: 7       # RefineNet 输入 = Iin(3) + Ms(1) + Ic1(3)，固定为 7
  cbam_reduction: 16          # CBAM 通道注意力压缩比，越大参数越少但表达力越弱

# ── 损失函数权重 ───────────────────────────────────────────────────────────────
loss:
  # LR Loss 多尺度文本区域权重：对应 [Ic4(1/4), Ic2(1/2), Ic1(1/1), Ire] 四个输出
  # 越靠近原分辨率权重越大，强迫网络在全尺度上精细还原
  lambda_n: [5, 6, 8, 10]

  # LR Loss 多尺度非文本区域权重：背景区域也需要保留，防止过度修改
  beta_n: [0.8, 0.8, 0.8, 2.0]

  lambda_lr: 1.0              # LR Loss 总缩放系数
  lambda_p: 0.0416            # 感知损失（VGG 特征 L1）权重（trial #37 最优）
  lambda_style: 0.01          # 风格损失（Gram 矩阵）权重，保持原值（0.63 会使 style 项压倒其他损失）
  lambda_sn: 1.0              # SN Loss 权重，监督软笔画掩码 Ms 的精度
  lambda_b: 0.2337            # Block Loss 权重，监督文本块掩码 Mb（trial #37 最优）

# ── 训练超参数 ─────────────────────────────────────────────────────────────────
train:
  epochs: 90
  batch_size: 16              # 每卡本地batch；A800建议>=16，DDP全局batch=local×卡数
  lr: 7.70e-4                 # Adam 初始学习率（trial #37 最优）
  adam_betas: [0.3037, 0.9]   # Adam 动量参数（beta1 由 trial #37 调优，beta2 保持 0.9）
  device: auto                # "auto" 自动选择 cuda/cpu，也可手动指定 "cuda:0"
  gpu_ids: [0]               # 单卡：[0]；多卡 DDP 请用 torchrun --nproc_per_node=N 启动，此字段忽略
  num_workers: 0              # DataLoader 子进程数，Windows 下必须为 0；Linux 下代码自动提升为 4
  save_every_n_epochs: 3      # 每隔多少 epoch 保存一次 checkpoint
  save_dir: ./checkpoints       # checkpoints/ensexam/YYYYMMDD_HHMMSS/ 的根目录
  resume: true              # 是否从 resume_path 断点续训
  resume_path: reptile_checkpoints\reptile_meta_init.pth # 运行后手动更新为实际路径
  seed: 42                  # 全局随机种子，固定后训练可复现；设为 null 则不固定
  reproducibility_mode: statistical  # strict=严格可复现(更慢)；statistical=统计可复现(更快，paper常用)

  # 学习率调度器
  scheduler:
    enabled: true
    type: cosine            # cosine | cosine_restart
    eta_min: 5.0e-7         # 最小学习率下限
    T_0: 20                 # 仅 cosine_restart：第一个周期长度（epoch）
    T_mult: 2               # 仅 cosine_restart：每次重启后周期倍增系数

# ── 数据集与预处理 ─────────────────────────────────────────────────────────────
data:
  data_root: E:\dataset\SCUT-EnsExam   # 数据集根目录，需含 train/test 子目录
  img_size: 512               # 裁剪块大小，模型固定输入尺寸
  overlap: 0                  # 滑动裁剪重叠像素，设为 128 可增加训练样本量
  mask_threshold: 20          # 生成掩码时判断像素差异的阈值（0~255），越小掩码越密
  val_ratio: 0.1              # 从训练集按图像粒度划出的验证比例（0 = 使用 test 目录）

  # 数据增强（albumentations）；注释掉整个 augmentation 节可完全关闭增强
  augmentation:
    horizontal_flip_p: 0.5          # 水平翻转概率
    vertical_flip_p: 0.3            # 垂直翻转概率
    rotate90_p: 0.3                 # 随机旋转 90/180/270° 概率（仅适用于正方形 patch）
    brightness_limit: 0.2           # 亮度扰动幅度，实际范围 [-0.2, 0.2]
    contrast_limit: 0.2             # 对比度扰动幅度，实际范围 [-0.2, 0.2]
    brightness_contrast_p: 0.5      # 亮度/对比度增强整体概率
    gauss_noise_var_limit: [10, 50] # 高斯噪声方差范围（像素强度²），模拟扫描噪点
    gauss_noise_p: 0.2              # 高斯噪声概率

    # 领域增强：接入 tools/visualize_stroke_insert.py 与 tools/visualize_color_augment.py 对应方法
    # 执行顺序固定为：先 color_augment，再 stroke_insert。
    # 原因：颜色增强针对原卷分布；若先插入再改色，会把新插入字迹也改色，偏离插入策略。
    #
    # 推荐策略：
    # 1) 先只在 train 开启（最稳），meta/tune 关闭，保证对比和调参稳定。
    # 2) 若希望元初始化更鲁棒，再把 meta 加入 apply_on，并适当下调 p。
    # 3) tune 阶段通常建议关闭或弱化，避免 trial 间噪声过大。
    domain_augment:
      enabled: true                 # 总开关：false 时忽略下方全部领域增强配置
      apply_on: [train]             # 生效阶段：可选 train / meta / tune
      p: 0.7                        # 进入领域增强流水线的总概率（建议 0.4~0.8）

      stroke_insert:
        enabled: true               # 字迹插入分支开关
        p: 0.5                      # 在已进入领域增强样本中，触发字迹插入概率（建议 0.3~0.7）
        mode: library               # exam=从当前卷提取字迹；library=从笔迹库采样（推荐）

        exam_params:
          n_insert: 6               # 每个 patch 最多插入多少块字迹（建议 3~10）
          noise_threshold: 50       # 噪声阈值，越大越严格过滤 GT 擦除残留噪声
          min_patch_peak: 50        # 候选 patch 最低峰值，越大越偏向深墨迹
          min_area: 500             # 候选连通域最小面积，过滤小噪点
          text_threshold: 210       # 目标空白判定阈值，越大可插入区域越少
          margin: 30                # 距离题目/已有内容的安全边距（像素）

        library_params:
          library_dir: data/stroke_library  # 推荐传根目录：自动递归收集 **/patches/*.png（多科目/多PDF）
          n_insert: 10              # 每个 patch 最多插入块数（建议 5~15）
          scale_range: [0.7, 1.3]   # 缩放范围，>1 更大，<1 更小
          angle_range: [-30, 30]    # 旋转角度范围（度）；设为 null 可关闭旋转
          ink_color: random         # random | [R,G,B] | null(保留库中原色)
          text_threshold: 210       # 目标空白判定阈值
          margin: 30                # 安全边距（像素）

      color_augment:
        enabled: true               # 颜色增强分支开关
        p: 0.7                      # 在已进入领域增强样本中，触发颜色增强概率（建议 0.4~0.9）
        mode: both                  # stroke=只换笔迹色；text=只染印刷字；both=组合增强

        stroke_params:
          stroke_color: random      # random 或 [R, G, B]
          threshold: 15             # 笔迹提取阈值（建议 10~20）
          norm_scale: 100.0         # 笔迹着色饱和度（小=更浓，大=更淡）

        text_params:
          color_ratio: 0.25         # 被着色词组比例（建议 0.1~0.4）
          n_colors: 3               # 同图出现颜色数（建议 1~3）
          dilation_px: 15           # 词组聚合膨胀宽度（512 patch 建议 10~20）
          min_area: 300             # 词组最小面积，过滤标点噪声
          text_threshold: 180       # 印刷字阈值，越大覆盖越多

# ── 推理预处理 ────────────────────────────────────────────────────────────────
inference:
  auto_scale:
    enabled: true                  # 总开关：false 时保持原始推理流程，方便 A/B 对比
    reference_text_height: 16.0    # 基于 train/all_labels 全量 430 张 GT 图统计得到的中位文字高度（px）
    trigger_ratio: 1.05            # 当前页估计文字高度偏离参考尺度超过该比例时才触发自动缩放
    min_scale: 0.5                 # 最多缩小到原图的 50%
    max_scale: 1.5                 # >1.0 时允许自动放大偏小页面
    min_components: 30             # 至少需要这么多候选连通域才认为尺度估计可靠

# ── 评估与展示 ────────────────────────────────────────────────────────────────
evaluation:
  standalone_test_mode: both      # test.py 默认模式：patch / page / both
  final_test_mode: both           # train.py 训练结束后的最终测试模式：patch / page / both
  page_overlap: 32                # 整页评估滑窗重叠像素；越大越平滑，但推理更慢

# ── 早停 ───────────────────────────────────────────────────────────────────────
early_stopping:
  enabled: true
  patience: 30                # 连续多少 epoch 无改善后停止
  min_delta: 0.01             # PSNR 至少提升 0.01 dB 才算显著改善
  mode: max                   # PSNR 越大越好

# ── Reptile 元训练 ─────────────────────────────────────────────────────────────
# 运行 meta_train.py 使用；train.py 二次训练时忽略此节
# 数据集统计（tools/analyze_dataset.py）：430 张图，每图约 15~20 patches，
# batch_size=8 下每个 task 仅有 ~2 个 batch，因此 inner_steps 不宜超过 2
reptile:
  meta_epochs: 500            # 500 episode，每张图平均被元训练 ~4.7 次
  inner_lr: 0.0001            # 与 train.lr 保持一致
  inner_steps: 2              # 每 task ~2 batch，2 步遍历该图全部 patch；Reptile 对过拟合较鲁棒
  meta_lr: 0.1                # ε，Reptile 标准值
  n_tasks_per_episode: 8      # 每 episode 采样 8 张图，增加风格多样性（共 430 张）
  log_every_n_epochs: 10      # 每隔多少 episode 打印一次平均损失
  save_every_n_epochs: 50     # 每 50 episode 保存一次中间 checkpoint
  save_dir: ./checkpoints       # checkpoints/meta/YYYYMMDD_HHMMSS/ 的根目录

# ── 超参数调优（Optuna） ────────────────────────────────────────────────────────
tuning:
  n_trials: 100                          # 总共跑多少个 trial
  tune_epochs: 10                        # 每个 trial 跑几个 epoch
  init_weights: ./reptile_checkpoints/reptile_meta_init.pth  # 每个 trial 的起点权重
  storage: sqlite:///tuning.db          # SQLite 持久化，支持断点续调
  study_name: ensexam_finetune

  # 搜索空间：[min, max]，log: true 的参数建议跨越多个数量级
  search_space:
    lr: [1.0e-5, 1.0e-3]      # log scale，最影响收敛速度
    beta1: [0.3, 0.7]          # Adam β₁，GAN 训练对此敏感
    lambda_p: [0.01, 0.2]      # log scale，感知损失权重
    lambda_style: [0.001, 1]   # log scale，风格损失权重
    lambda_b: [0.1, 1.0]       # Block Loss（Dice）权重

# ── W&B ────────────────────────────────────────────────────────────────────────
wandb:
  enabled: true
  project: ensexam_zero           # W&B 项目名，同名实验会归到同一个项目下
  run_name: null               # null = W&B 自动生成随机名称（如 "golden-dawn-42"）
  log_image_every_n_epochs: 5  # 每隔多少 epoch 上传一批擦除对比图
